name: vip
description: VIP App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP
  http: ^1.2.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4

  # Routing
  go_router: ^13.0.0

  # Misc
  intl: ^0.20.2
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
